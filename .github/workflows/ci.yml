name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  watchos:
    name: watchOS Build and Tests
    runs-on: macos-latest
    timeout-minutes: 30

    env:
      PROJECT: wristonic.xcodeproj
      SCHEME: wristonic Watch App
      RESULT_BUNDLE: UnitTestResults.xcresult
      SIMCTL_CHILD_GITHUB_ACTIONS: "true"
      SIMCTL_CHILD_CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate shared scheme
        run: xcodebuild -list -project "$PROJECT"

      - name: Build watchOS app
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=watchOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Select and boot watchOS simulator
        run: |
          set -euo pipefail

          simulator_udid="$(
            xcrun simctl list --json devices available |
              jq -r '
                [
                  .devices[]
                  | .[]
                  | select(.isAvailable == true)
                  | select(.deviceTypeIdentifier | contains("Apple-Watch"))
                ]
                | sort_by(.name)
                | reverse
                | .[0].udid // empty
              '
          )"

          if [ -z "$simulator_udid" ]; then
            echo "No available Apple Watch simulator found."
            xcrun simctl list devices available
            exit 1
          fi

          echo "WATCH_SIMULATOR_UDID=$simulator_udid" >> "$GITHUB_ENV"
          xcrun simctl boot "$simulator_udid" || true
          xcrun simctl bootstatus "$simulator_udid" -b

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild -showdestinations -project "$PROJECT" -scheme "$SCHEME"
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "id=$WATCH_SIMULATOR_UDID" \
            -resultBundlePath "$RESULT_BUNDLE" \
            -only-testing:'wristonic Watch AppTests' \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Shutdown watchOS simulator
        if: always()
        run: |
          if [ -n "${WATCH_SIMULATOR_UDID:-}" ]; then
            xcrun simctl shutdown "$WATCH_SIMULATOR_UDID" || true
          fi

      - name: Upload unit test result bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: watchos-unit-test-results
          path: ${{ env.RESULT_BUNDLE }}
          if-no-files-found: ignore
