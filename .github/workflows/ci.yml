name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  watchos:
    name: watchOS Build and Tests
    runs-on: macos-latest
    timeout-minutes: 30

    env:
      PROJECT: wristonic.xcodeproj
      SCHEME: wristonic Watch App
      RESULT_BUNDLE: UnitTestResults.xcresult
      SIMCTL_CHILD_GITHUB_ACTIONS: "true"
      SIMCTL_CHILD_CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate shared scheme
        run: xcodebuild -list -project "$PROJECT"

      - name: Build watchOS app
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=watchOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Launch watchOS simulator
        id: simulator
        uses: futureware-tech/simulator-action@v4
        with:
          os: watchOS
          model: Apple Watch SE (40mm) (2nd generation)
          wait_for_boot: true
          shutdown_after_job: true

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild -showdestinations -project "$PROJECT" -scheme "$SCHEME"
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'id=${{ steps.simulator.outputs.udid }}' \
            -resultBundlePath "$RESULT_BUNDLE" \
            -only-testing:'wristonic Watch AppTests' \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Upload unit test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchos-unit-test-results
          path: ${{ env.RESULT_BUNDLE }}
          if-no-files-found: ignore
